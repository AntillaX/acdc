# Add this `location` block to /etc/nginx/sites-available/vv inside
# the existing `server { ... }` block, alongside /platform/, /auction/,
# and /level0/.
#
# Trailing slash on proxy_pass strips the /acdc/ prefix so the Node
# server sees requests at its own root (/, /app.js, /style.css, and
# the WS upgrade at /). The client computes its WebSocket URL from
# location.pathname so it naturally targets /acdc/.

# ─── AC/DC — Node.js + WebSocket ────────────────────────────────────
location /acdc/ {
    proxy_pass http://127.0.0.1:3300/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
